on:
  push:
    branches:
      - master
    tags:
      - "*"
      # Driver release tags carry only release assets, no code - don't run CI for them
      - "!drivers-*"
  pull_request:
    branches:
      - master

jobs:
  test_and_build:
    name: Test & Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false
    env:
      RUST_BACKTRACE: 1

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4
      - name: ⚙️ Rust
        uses: dtolnay/rust-toolchain@stable
      - name: 🐧 Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: 🍏 Dependencies
        if: matrix.os == 'macos-latest'
        run: brew install automake
      - name: 🍏 x86_64 target
        # Pico only distribute x86_64 macOS drivers so we build and test under Rosetta
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          echo "CARGO_BUILD_TARGET=x86_64-apple-darwin" >> "$GITHUB_ENV"
      - name: ⚡ Cache
        uses: Swatinem/rust-cache@v2
      - name: 🔎 Test
        run: cargo test
      - name: 🔨 Build
        run: cargo build --release --all-features

  publish:
    name: Publish
    # Only crate-version tags publish to crates.io. `drivers-*` tags just carry driver release
    # assets and must not trigger a crate publish.
    if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/drivers-')
    runs-on: windows-latest
    needs: test_and_build
    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4
      - name: ⚙️ Rust
        uses: dtolnay/rust-toolchain@stable
      - name: ⚡ Cache
        uses: Swatinem/rust-cache@v2
      - name: 🚀 Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish
